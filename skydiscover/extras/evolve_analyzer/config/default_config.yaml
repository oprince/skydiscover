# ── LLM backend ─────────────────────────────────────────────────────────────
llm:
  provider: "openai"
  model: "gpt-4o-mini"
  base_url: null
  api_key_env: "EVOLVE_ANALYZER_API_KEY"
  temperature: 0.0
  max_tokens: 4096

  overrides:
    stagnation_root_cause:   { model: "gpt-4o" }
    artifact_clustering:     { model: "gpt-4o" }
    exploration_structure:   { model: "gpt-4o" }
    meta_quality:            { model: "gpt-4o" }

  max_cost_usd: 5.0

# ── Ingestion ────────────────────────────────────────────────────────────────
ingestion:
  source: "jsonl"

# ── Analysis parameters ──────────────────────────────────────────────────────
stagnation:
  threshold: 10
  min_delta: 0.001

convergence:
  window: 10

search_space:
  top_k: 10

evaluator:
  score_variance_threshold: 0.1

# ── Compliance checks ────────────────────────────────────────────────────────
compliance:
  check_evolve_block: true
  check_format: true
  check_signature: true
  check_semantic: true

# ── LLM judge steps ──────────────────────────────────────────────────────────
judges:
  stagnation_root_cause: true
  artifact_clustering: true
  mutation_quality: true
  semantic_compliance: true
  exploration_structure: true
  meta_quality: true

  async_dispatch: false
  sample_rate: 0.2
  artifact_batch_size: 20

# ── Historical / comparative analysis ────────────────────────────────────────
historical:
  db_path: null
  min_experiments: 5
  pattern_promotion_threshold: 3

# ── In-flight mode (Phase 2 — not active in Phase 1) ────────────────────────
inflight:
  poll_interval_seconds: 15
  sort_buffer_size: 20
  state_file: ".evolve_analyzer_state.json"
  completion_timeout_seconds: 120
